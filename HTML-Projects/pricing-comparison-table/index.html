<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Comparison Table</title>
    <!-- Link stylesheet -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <header>
        <h1>Acme Plan</h1>
        <!-- Navigation Bar -->
        <div class="nav-links">
            <a>Home</a>
            <a>About</a>
            <a>Contact</a>
        </div>
    </header>
    <main>
        <table>
            <!-- header row -->
            <caption><h3>Plan comparison</h3></caption>
            <thead>
                <tr>
                    <th scope="col">Plan</th>
                    <th scope="col">Storage</th>
                    <th scope="col">Projects</th>
                    <th scope="col">Support</th>
                </tr>
            </thead>
            <tbody>
            <!-- Free Plan -->
                <tr>
                    <th scope="row">Free</th>
                    <td>5 GB</td>
                    <td>3</td>
                    <td>Email</td>
                </tr>
            <!-- Pro Plan -->
                <tr>
                    <th scope="row">Pro</th>
                    <td>100 GB</td>
                    <td>25</td>
                    <td>Priority Email</td>
                </tr>
            <!-- Business Plan -->
                <tr>
                    <th scope="row">Business</th>
                    <td>1 TB</td>
                    <td>Unlimited</td>
                    <td>24/7 Phone</td>
                </tr>
            </tbody>
    </main>
    <footer>
        <!-- footer row -->
        <tfoot>
            <tr>
               <td colspan="4">
                 All plans include SSl and daily backups
               </td>
            </tr>
        </tfoot>
    </table>
    </footer>
</body>
</html>
