<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav>
            <h1>Acme Support</h1>
            <a href="/home">Home</a>
            <a href="/help">Help</a>
            <a href="/contact">Contact</a>
        </nav>
        <hr>
    </header>
    <main>
        <form>
            <fieldset>
                <h2>Contact us</h2>
                <p>Send us a message and we will get back to you.</p>
               <div> 
                    <label id="full-name" for="full-name">Full name</label>
                    <input 
                    class="contact-info"
                    type="text"
                    name="full-name"
                    required
                    >
              </div> 
              <div > 
                    <label id="email" for="email">Email</label>
                    <input 
                    class="contact-info"
                    type="email"
                    name="email"
                    required
                    >
                </div>
            </fieldset>
            <fieldset>
              <label id="subject" for="Subject">Subject
                <select name="Subject" aria-placeholder="Choose a topic">
                 <option value="Choose a topic" disabled selected hidden>Choose a topic </option >
                 <option value="Choose a topic 1">Choose a topic 1</option>
                 <option value="Choose a topic 2">Choose a topic 2</option>
                 <option value="Choose a topic 3">Choose a topic 3</option> 
                 <option value="Choose a topic 4">Choose a topic 4</option>   
                </select>    
              </label>
              <label id="message" for="Message">Message</label>
                <textarea rows="6" cols="40" required></textarea>
            </fieldset>
            <fieldset>
                <legend>How did you hear about us ?</legend>
                <label class="source"  for="search">
                    <input  type="radio" name="source">
                    Search
                </label>
                <label class="source" for="Friend">    
                    <input type="radio" name="source">
                    Friend
                </label>
                <label class="source" for="Social-media">
                    <input  type="radio" name="source">
                    Social media
                </label>   
            </fieldset>

            <label id="updates" for="send-me-product-updates">
                <input type="checkbox" name="checkbox">
                Send me product updates
            </label>

            <button type="submit">Send message</button>
        </form>    
    </main>
    <footer>
        <hr>
        <p>&copy; 2026 Acme Support</p>
    </footer>
</body>
</html>
