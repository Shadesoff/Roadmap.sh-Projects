<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Showcase</title>
</head>
<body>
    <header>
        <h1>Photo Showcase</h1>
    </header>
    <main>
        <!--first image-->
        <figure>
            <img 
            src="https://images.pexels.com/photos/37439123/pexels-photo-37439123.jpeg"
            height="350"
            width="250"
            alt="seaside cliff"
            >
            <figcaption>A dramatic seaside cliff with waves crashing along the rocky shore under a blue sky.</figcaption>
        </figure>
        <!--Second image-->
        <figure>
            <img
            src="https://images.pexels.com/photos/37329282/pexels-photo-37329282.jpeg"
            height="300"
            width="300"
            alt="black stork soaring gracefully" 
            >
            <figcaption>A black stork soaring gracefully through a cloudless blue sky, showcasing its impressive wingspan.</figcaption>
        </figure>
        <!--Third image-->
        <figure>
            <img 
            src="https://images.pexels.com/photos/37870520/pexels-photo-37870520.jpeg"
            height="400"
            width="300"
            alt="Palace of Culture and Science in Warsaw">
            <figcaption>Stunning aerial shot of the Palace of Culture and Science in Warsaw at twilight.</figcaption>
        </figure>
        <!--Fourth image-->
        <figure>
            <img 
            src="https://images.pexels.com/photos/38032207/pexels-photo-38032207.jpeg"
            height="400"
            width="300"
            alt="view of traditional houses amidst lush gardens in Malmesbury"
            >
            <figcaption>Scenic summer view of traditional houses amidst lush gardens in Malmesbury, England</figcaption>
        </figure>
        <figure>
            <img 
            src="decorative.jpg"
            width="300"
            height="300"
            alt=""
            >
        </figure>
        <!--fifth image-->
        <figure>
            <img 
            src="https://images.pexels.com/photos/37702370/pexels-photo-37702370.jpeg"
            height="400"
            width="300"
            alt="vase of vibrant poppies bathed in warm afternoon sunlight">
            <figcaption>A vase of vibrant poppies bathed in warm afternoon sunlight, creating a soft and inviting scene.</figcaption>
        </figure>
        <!--Sixth image-->
        <figure>
            <img 
            src="https://images.pexels.com/photos/19608791/pexels-photo-19608791.jpeg"
            width="300"
            height="300"
            alt="Two  swans gliding on a serene lake under a clear sky"
            >
            <figcaption>Two elegant swans gliding on a serene lake under a clear sky.</figcaption>
        </figure>
        <!--Video-->
        <video
         height="800"
         width="600"
         controls
         poster="https://images.pexels.com/photos/34935491/pexels-photo-34935491.jpeg"
         >
            <source src="https://www.pexels.com/download/video/36629161/" type="video/mp4">
              Your browser does not support the video tag.
        </video>
    </main>
    <footer>
         <p>&copy; 2026 Photo Showcase</p>
    </footer>
</body>
</html>
