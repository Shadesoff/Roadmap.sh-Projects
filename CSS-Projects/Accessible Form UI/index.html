<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Form UI</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form>
        <section class="left">
        <!--Name Section-->
            <div class="full-name">  
                <label for="full-name">Full Name</label>
                <input
                type="text"
                placeholder="What should we call you?"
                id="full-name" 
                name="full-name" 
                required
                >
            </div>  
        <!--Email Section-->
            <div class="email">
                <label for="email">Email</label>
                <input 
                    type="email" 
                    placeholder="example@yourmail.com" 
                    id="email"       
                    name="email"
                    aria-invalid="true" 
                    required
                >
                <p id="error">
                    Email is already taken
                </p>
            </div>
        <!--Password Section-->
            <div class="password">
                <label for="Password">Enter Password</label>
                <input
                 type="password"
                 placeholder="xxxxxxxxx"
                 required
                 >
        
                <label for="Confirm password">Confirm Password</label>
                <input 
                 type="password"
                 placeholder="xxxxxxxxx"
                 required
                 >
            </div>
            <button id="update-btn" type="submit">Update Profile</button>
        </section>
        <section class="right">
            <!--Progress graph Section-->    
            <div class="progress-graph">
                <div class="inner-circle">
                    <span>65%</span>
                </div>
            </div>
            <!--Task Progress List-->
            <p id="progress-list">Profile Completeness</p>
            <div class="list-items">
                <ul>
                    <li class="line-through">Create Account</li>
                    <li class="line-through">Update Roadmap Progress</li>
                    <li class="line-through">Setup Public Profile</li>
                    <li>Complete your first project</li>
                    <li>Invite your Friends</li>
                </ul>
            </div>
        </section>
    </form>
</body>
</html>
